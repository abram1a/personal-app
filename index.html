<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>我的研究生三年</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#14231D" />
<link rel="manifest" href="manifest.json" />
<style>
  :root {
    --bg: #FAFBF8; --grid: #E4E9E2; --ink: #18241F; --ink-soft: #5C6B63;
    --copper: #B5552D; --copper-soft: #F3E2D7; --copper-bright: #E8A87E;
    --silicon: #2F6F6A; --silicon-soft: #DDEAE7;
    --gold: #9A7B2D; --gold-soft: #F0E8D2;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
    padding-bottom: 60px;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 0 16px; }
  button { font-family: inherit; border: none; background: none; cursor: pointer; color: inherit; padding: 0; }
  button:focus-visible { outline: 2px solid var(--copper); outline-offset: 2px; }

  header {
    position: relative; overflow: hidden;
    background: linear-gradient(150deg, #14231D 0%, #1C3830 55%, #265048 100%);
    border-radius: 0 0 24px 24px;
    padding: calc(env(safe-area-inset-top, 0px) + 32px) 20px 22px;
  }
  .glow { position: absolute; border-radius: 50%; pointer-events: none; }
  .glow-a { width: 240px; height: 240px; right: -80px; top: -90px;
    background: radial-gradient(circle, rgba(224,141,95,.28) 0%, transparent 70%); }
  .glow-b { width: 200px; height: 200px; left: -70px; bottom: -100px;
    background: radial-gradient(circle, rgba(127,181,174,.22) 0%, transparent 70%); }
  .hero { position: relative; max-width: 640px; margin: 0 auto; }
  .date { font-size: 12px; font-weight: 500; color: var(--copper-bright); }
  h1 { margin: 6px 0 0; font-size: 24px; line-height: 1.2; color: var(--bg); }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  .chip { font-size: 12px; padding: 5px 12px; border-radius: 999px;
    background: rgba(250,251,248,.12); color: rgba(250,251,248,.85); }
  .chip b { color: #fff; font-weight: 600; }

  nav {
    position: sticky; top: 8px; z-index: 20; display: flex; gap: 4px;
    margin-top: 16px; padding: 6px; border-radius: 999px;
    background: rgba(250,251,248,.92); border: 1px solid var(--grid);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 4px 16px rgba(24,36,31,.08);
  }
  nav button {
    flex: 1; padding: 9px 0; border-radius: 999px; font-size: 14px; font-weight: 500;
    color: var(--ink-soft); transition: all .2s;
  }
  nav button.active { background: var(--ink); color: var(--bg); box-shadow: 0 2px 8px rgba(24,36,31,.25); }

  .card {
    background: #fff; border: 1px solid var(--grid); border-radius: 14px; overflow: hidden;
    box-shadow: 0 1px 2px rgba(24,36,31,.04), 0 6px 20px rgba(24,36,31,.05);
    margin-top: 16px; animation: fade .35s ease both;
  }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
  .card-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--grid); }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .card-head h2 { margin: 0; font-size: 15px; }
  .card-head .meta { margin-left: auto; font-size: 12px; color: var(--ink-soft); }
  .group-head { padding: 10px 16px; border-bottom: 1px solid var(--grid); font-size: 12px; font-weight: 600; }
  ul { list-style: none; margin: 0; padding: 0; }
  li + li { border-top: 1px solid #F0F3EE; }
  .item {
    width: 100%; display: flex; align-items: flex-start; gap: 12px;
    padding: 11px 16px; text-align: left; font-size: 14px; transition: background .15s;
  }
  .item:active { background: #F4F6F2; }
  .ck { width: 19px; height: 19px; border-radius: 50%; border: 2px solid var(--grid); flex-shrink: 0; margin-top: 1px;
    display: flex; align-items: center; justify-content: center; font-size: 12px; color: #fff; transition: all .15s; }
  .item.done .ck { border-color: transparent; }
  .item.done .t { color: var(--ink-soft); text-decoration: line-through; }
  .t { display: block; }
  .n { display: block; font-size: 12px; color: var(--ink-soft); margin-top: 2px; text-decoration: none !important; }

  /* Anki */
  .anki-idle { padding: 18px 16px; display: flex; align-items: center; gap: 12px; }
  .anki-idle .big-n { font-size: 34px; font-weight: 700; color: var(--copper); line-height: 1; }
  .anki-idle .lbl { font-size: 13px; color: var(--ink-soft); }
  .anki-card { padding: 22px 18px; text-align: center; }
  .anki-q { font-size: 17px; font-weight: 600; min-height: 48px; white-space: pre-wrap; }
  .anki-a { font-size: 15px; color: var(--ink); white-space: pre-wrap; border-top: 1px dashed var(--grid); margin-top: 14px; padding-top: 14px; }
  .anki-btns { display: flex; gap: 10px; justify-content: center; margin-top: 18px; }
  .anki-prog { font-size: 11px; color: var(--ink-soft); margin-top: 14px; }
  .done-banner { padding: 26px 16px; text-align: center; font-size: 15px; color: var(--silicon); font-weight: 600; }

  /* 更多菜单 */
  .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
  .menu-item {
    background: #fff; border: 1px solid var(--grid); border-radius: 14px;
    padding: 16px 14px; text-align: left;
    box-shadow: 0 1px 2px rgba(24,36,31,.04), 0 6px 20px rgba(24,36,31,.05);
    animation: fade .35s ease both;
  }
  .menu-item .emoji { font-size: 22px; }
  .menu-item .name { display: block; font-size: 15px; font-weight: 600; margin-top: 8px; }
  .menu-item .stat { display: block; font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
  .back { display: inline-flex; align-items: center; gap: 4px; font-size: 13px; color: var(--ink-soft); margin-top: 16px; }

  .pipe-card { background: linear-gradient(150deg, #14231D, #265048); border-radius: 14px; padding: 14px; margin-top: 16px; }
  .pipe { display: flex; gap: 4px; }
  .pipe button { flex: 1; position: relative; overflow: hidden; border-radius: 8px; height: 38px; background: rgba(250,251,248,.10); }
  .pipe button.active { box-shadow: inset 0 0 0 2px var(--bg); }
  .pipe .fill { position: absolute; left: 0; right: 0; bottom: 0; transition: height .5s; }
  .pipe .lbl { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 500; color: rgba(250,251,248,.85); line-height: 1.1; text-align: center; }
  .pipe-hint { font-size: 10px; color: rgba(250,251,248,.45); margin-top: 8px; }

  .sem-bar { border-radius: 14px; padding: 14px 16px; display: flex; flex-wrap: wrap; align-items: baseline; gap: 10px; margin-top: 16px; }
  .sem-bar .name { font-size: 17px; font-weight: 700; }
  .sem-bar .theme { font-size: 14px; }
  .sem-bar .meta { margin-left: auto; font-size: 12px; color: var(--ink-soft); }

  .tip { font-size: 13px; color: var(--ink-soft); padding: 0 4px; margin-top: 16px; }

  .counter { padding: 20px; text-align: center; }
  .counter-label { font-size: 12px; font-weight: 600; color: var(--ink-soft); text-align: left; }
  .counter-row { display: flex; align-items: center; justify-content: center; gap: 22px; margin-top: 10px; }
  .big { font-size: 48px; font-weight: 700; line-height: 1; }
  .unit { font-size: 12px; color: var(--ink-soft); margin-top: 4px; }
  .round { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .round.minus { border: 1px solid var(--grid); color: var(--ink-soft); }
  .round.plus { background: var(--copper); color: #fff; box-shadow: 0 2px 8px rgba(181,85,45,.3); }
  .bar { height: 8px; border-radius: 999px; background: var(--copper-soft); overflow: hidden; position: relative; margin-top: 20px; }
  .bar .f { height: 100%; background: var(--copper); transition: width .5s; }
  .bar .mid { position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: var(--bg); }
  .marks { display: flex; justify-content: space-between; font-size: 10px; color: var(--ink-soft); margin-top: 6px; }
  .marks .hit { color: var(--copper); }

  .input-card { padding: 12px; }
  textarea, input[type=text], input[type=number] {
    width: 100%; resize: none; border: 1px solid var(--grid); border-radius: 8px;
    background: var(--bg); color: var(--ink); padding: 10px; font: inherit; font-size: 14px;
  }
  input[type=text] { margin-top: 8px; }
  .input-foot { display: flex; justify-content: flex-end; margin-top: 8px; }
  .pill { padding: 8px 22px; border-radius: 999px; font-size: 14px; font-weight: 500; color: #fff; }
  .pill:disabled { opacity: .4; }
  .pill.copper { background: var(--copper); box-shadow: 0 2px 8px rgba(181,85,45,.3); }
  .pill.silicon { background: var(--silicon); box-shadow: 0 2px 8px rgba(47,111,106,.3); }
  .pill.ghost { color: var(--ink-soft); border: 1px solid var(--grid); background: #fff; box-shadow: none; }
  .entry { display: flex; gap: 12px; padding: 12px 16px; font-size: 14px; }
  .entry .d { flex-shrink: 0; font-size: 12px; padding-top: 2px; font-variant-numeric: tabular-nums; }
  .entry p { margin: 0; flex: 1; white-space: pre-wrap; }
  .entry .del { color: var(--ink-soft); font-size: 13px; align-self: flex-start; padding: 2px 6px; }
  .empty { text-align: center; padding: 32px 0; font-size: 14px; color: var(--ink-soft); }

  footer { display: flex; justify-content: center; gap: 18px; margin-top: 40px; font-size: 12px; color: var(--ink-soft); flex-wrap: wrap; }
  footer .danger { background: var(--copper); color: #fff; padding: 4px 16px; border-radius: 999px; font-weight: 500; }
</style>
</head>
<body>

<header>
  <div class="glow glow-a"></div>
  <div class="glow glow-b"></div>
  <div class="hero">
    <div class="date" id="dateLine"></div>
    <h1 id="heroTitle">今天</h1>
    <div class="chips" id="chips"></div>
  </div>
</header>

<div class="wrap">
  <nav id="nav"></nav>
  <main id="main"></main>
  <footer>
    <button onclick="exportData()">备份数据</button>
    <button onclick="importData()">导入备份</button>
    <button class="danger" onclick="resetAll()">清空全部进度</button>
  </footer>
</div>

// ============ 工具 ============
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function fmt(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function today(){ return fmt(new Date()); }
function addDays(n){ const d = new Date(); d.setDate(d.getDate()+n); return fmt(d); }
function weekKey(){
  const d = new Date();
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil((((d - jan1) / 86400000) + jan1.getDay() + 1) / 7);
  return d.getFullYear() + "-W" + week;
}
function monthKey(){ const n = new Date(); return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0"); }
function semProgress(sem){
  const ids = sem.phases.flatMap(p=>p.tasks.map(t=>t[0]));
  return ids.length ? ids.filter(id=>S.tasks[id]).length / ids.length : 0;
}
function habitStreak(){
  let streak = 0;
  const d = new Date();
  for (let i = 0; i < 730; i++) {
    if ((S.habits[fmt(d)]||[]).length >= STREAK_NEED) { streak++; }
    else if (i === 0) { /* 今天尚未达标不打断 */ }
    else break;
    d.setDate(d.getDate()-1);
  }
  return streak;
}
function dueCards(){ const t = today(); return S.anki.cards.filter(c => c.due <= t); }
function totalPct(){
  const doneT = ALL_TASK_IDS.filter(id=>S.tasks[id]).length;
  const doneC = ALL_COURSE_IDS.filter(id=>S.courses[id]).length;
  const doneP = ALL_PAPER_IDS.filter(id=>S.papers[id]).length;
  return Math.round((doneT+doneC+doneP)/(ALL_TASK_IDS.length+ALL_COURSE_IDS.length+ALL_PAPER_IDS.length)*100);
}
function addPts(n){ S.pts = Math.max(0, S.pts + n); }

    const wArr = S.life.w[wk2] || [], mArr = S.life.m[mk] || [];
    m.innerHTML = backBtn() + `<p class="tip">生活事务定死节奏就不用再想，注意力留给学习。</p>
      <section class="card">
        <div class="group-head" style="color:var(--copper)">每周 · ${wArr.length}/${LIFE_WEEKLY.length}（每周一刷新）</div>
        <ul>${LIFE_WEEKLY.map(([id,t,n]) => checkRow(wArr.includes(id), "var(--copper)", t, n, `toggleLife('w','${id}')`)).join("")}</ul>
      </section>
      <section class="card">
        <div class="group-head" style="color:var(--gold)">每月 · ${mArr.length}/${LIFE_MONTHLY.length}（每月1号刷新）</div>
        <ul>${LIFE_MONTHLY.map(([id,t,n]) => checkRow(mArr.includes(id), "var(--gold)", t, n, `toggleLife('m','${id}')`)).join("")}</ul>
      </section>`;

  } else if (S.tab === "method") {
    m.innerHTML = backBtn() +
      `<section class="card">
        <div class="group-head" style="color:var(--copper)">学习心法 · 认知科学验证有效</div>
        <ul>${STUDY_TIPS.map(([t,n]) => `<li><div class="entry"><p><b>${t}</b><span class="n">${n}</span></p></div></li>`).join("")}</ul>
      </section>
      <section class="card">
        <div class="group-head" style="color:var(--gold)">一日节奏参考 · 不必照搬，抓住"上午两个深度块"即可</div>
        <ul>${SCHEDULE.map(([t,n]) => `<li><div class="entry"><span class="d" style="color:var(--gold)">${t}</span><p>${n}</p></div></li>`).join("")}</ul>
      </section>
      <section class="card">
        <div class="group-head" style="color:var(--silicon)">饮食原则</div>
        <ul>${DIET.map(t => `<li><div class="entry"><p>${t}</p></div></li>`).join("")}</ul>
      </section>`;

  } else if (S.tab === "log") {
    const wk = weekKey();
    const wDone = S.weekly[wk] || [];
    m.innerHTML = backBtn() + `<section class="card">
        <div class="group-head" style="color:var(--gold)">本周复盘 · ${wDone.length}/${WEEKLY.length}（每周一自动刷新）</div>
        <ul>${WEEKLY.map(([id,t]) => checkRow(wDone.includes(id), "var(--gold)", t, "", `toggleWeekly('${id}')`)).join("")}</ul>
        <div class="input-card">
          <textarea id="weekDraft" rows="2" placeholder="下周最重要的三件事：1… 2… 3…"></textarea>
          <div class="input-foot"><button class="pill copper" onclick="saveWeekPlan()">存为复盘记录</button></div>
        </div>
      </section>
      <section class="card"><div class="input-card">
        <textarea id="logDraft" rows="3" placeholder="今天做了什么、卡在哪、明天第一件事…"></textarea>
        <div class="input-foot"><button class="pill copper" onclick="addLog()">记录今天</button></div>
      </div></section>
      <section class="card"><ul>
        ${S.logs.length ? S.logs.map(l =>
          `<li><div class="entry">
            <span class="d" style="color:var(--copper)">${l.date}</span>
            <p>${esc(l.text)}</p>
            <button class="del" onclick="delLog(${l.id})">✕</button>
          </div></li>`).join("")
        : `<li class="empty">还没有日志，今天写下第一条吧</li>`}
      </ul></section>`;
  }
}

function renderAll(){ renderHeader(); renderNav(); renderMain(); }

// ============ 操作 ============
const PTS_MAP = { tasks: 25, courses: 80, papers: 40 };
function toggle(kind, id){
  S[kind][id] = !S[kind][id];
  addPts((PTS_MAP[kind] || 0) * (S[kind][id] ? 1 : -1));
  save(); renderAll();
}
function goSem(id){ S.activeSem = id; save(); renderAll(); }
function goTab(id){ S.tab = id; R = null; save(); renderAll(); window.scrollTo(0,0); }
function toggleHabit(id){
  const k = today();
  const arr = S.habits[k] || [];
  const checking = !arr.includes(id);
  S.habits[k] = checking ? arr.concat(id) : arr.filter(x=>x!==id);
  addPts((id === "t1" ? 30 : 10) * (checking ? 1 : -1));
  if (checking && S.habits[k].length >= STREAK_NEED && !S.bonus["day-"+k]) {
    S.bonus["day-"+k] = true; addPts(50);
  }
  save(); renderAll();
}
function toggleLife(scope, id){
  const k = scope === "w" ? weekKey() : monthKey();
  const arr = S.life[scope][k] || [];
  const checking = !arr.includes(id);
  S.life[scope][k] = checking ? arr.concat(id) : arr.filter(x=>x!==id);
  addPts(10 * (checking ? 1 : -1));
  save(); renderAll();
}
function toggleWeekly(id){
  const k = weekKey();
  const arr = S.weekly[k] || [];
  const checking = !arr.includes(id);
  S.weekly[k] = checking ? arr.concat(id) : arr.filter(x=>x!==id);
  addPts(10 * (checking ? 1 : -1));
  save(); renderAll();
}
function bump(d){
  const before = S.leet.count;
  S.leet.count = Math.max(0, S.leet.count + d);
  addPts((S.leet.count - before) * 5);
  save(); renderAll();
}

// --- Anki ---
function startReview(){
  R = { queue: dueCards().map(c=>c.id), i: 0, back: false };
  renderAll();
}
function grade(ok){
  const card = S.anki.cards.find(c => c.id === R.queue[R.i]);
  if (card) {
    if (ok) {
      const step = card.step || 0;
      card.due = addDays(ANKI_LADDER[Math.min(step, ANKI_LADDER.length-1)]);
      card.step = step + 1;
    } else {
      card.step = 0;
      card.due = addDays(1);
    }
    addPts(2);
  }
  R.i++; R.back = false;
  // 队列清空：自动勾掉"清空Anki队列" + 一次性奖励
  if (R.i >= R.queue.length && dueCards().length === 0) {
    const k = today();
    const arr = S.habits[k] || [];
    if (!arr.includes("t2")) {
      S.habits[k] = arr.concat("t2");
      addPts(10);
      if (S.habits[k].length >= STREAK_NEED && !S.bonus["day-"+k]) {
        S.bonus["day-"+k] = true; addPts(50);
      }
    }
    if (!S.bonus["anki-"+k]) { S.bonus["anki-"+k] = true; addPts(20); }
  }
  save(); renderAll();
}
function addCard(){
  const f = document.getElementById("cardFront").value.trim();
  const b = document.getElementById("cardBack").value.trim();
  if (!f || !b) { alert("正面和背面都要填哦"); return; }
  S.anki.cards.unshift({ id: Date.now(), front: f, back: b, due: today(), step: 0 });
  save(); renderAll();
}
function delCard(id){ S.anki.cards = S.anki.cards.filter(c=>c.id!==id); save(); renderAll(); }

// --- 日志 ---
function addLog(){
  const el = document.getElementById("logDraft"); const t = el.value.trim(); if(!t) return;
  S.logs.unshift({id:Date.now(), date:today(), text:t}); addPts(5); save(); renderAll();
}
function delLog(id){ S.logs = S.logs.filter(x=>x.id!==id); addPts(-5); save(); renderAll(); }
function addLeetNote(){
  const el = document.getElementById("leetDraft"); const t = el.value.trim(); if(!t) return;
  S.leet.notes.unshift({id:Date.now(), date:today(), n:S.leet.count, text:t}); addPts(5); save(); renderAll();
}
function delLeetNote(id){ S.leet.notes = S.leet.notes.filter(x=>x.id!==id); addPts(-5); save(); renderAll(); }
function saveWeekPlan(){
  const el = document.getElementById("weekDraft"); const t = el.value.trim(); if(!t) return;
  S.logs.unshift({id:Date.now(), date:today(), text:"【周复盘】下周最重要的三件事：\n"+t});
  const k = weekKey();
  const arr = S.weekly[k] || [];
  if(!arr.includes("w5")) { S.weekly[k] = arr.concat("w5"); addPts(10); }
  if(!S.bonus["week-"+k]) { S.bonus["week-"+k] = true; addPts(100); }
  save(); renderAll();
}

// --- 奖励商店 ---
function redeem(id){
  const it = S.shop.items.find(x => String(x.id) === String(id));
  if (!it || S.pts < it.cost) return;
  if (id === "mend") {
    const d = new Date(); d.setDate(d.getDate()-1);
    let target = null;
    for (let i = 0; i < 14; i++) {
      const k = fmt(d);
      if ((S.habits[k]||[]).length < STREAK_NEED) { target = k; break; }
      d.setDate(d.getDate()-1);
    }
    if (!target) { alert("最近14天没有断签，不需要补签卡！"); return; }
    let arr = S.habits[target] || [];
    let i = 0;
    while (arr.length < STREAK_NEED) { arr = arr.concat("补"+(++i)); }
    S.habits[target] = arr;
  }
  S.pts -= it.cost;
  S.shop.redeemed.unshift({ id:Date.now(), date:today(), name:it.name, cost:it.cost });
  save(); renderAll();
}
function addShopItem(){
  const name = document.getElementById("shopName").value.trim();
  const cost = parseInt(document.getElementById("shopCost").value, 10);
  if (!name || !cost || cost <= 0) { alert("名称和积分都要填，积分须为正整数"); return; }
  S.shop.items.push({ id:"u"+Date.now(), name, cost });
  S.shop.items.sort((a,b)=>a.cost-b.cost);
  save(); renderAll();
}
function delShopItem(id){ S.shop.items = S.shop.items.filter(x=>x.id!==id); save(); renderAll(); }

// --- 数据 ---
function resetAll(){
  if(!confirm("确定清空所有进度和日志吗？此操作无法撤销。")) return;
  S = { tasks:{}, papers:{}, courses:{}, leet:{count:0,notes:[]}, logs:[],
        habits:{}, weekly:{}, life:{d:{},w:{},m:{}}, anki:{cards:[]},
        pts:0, bonus:{}, shop:{ items:DEFAULT_SHOP.map(x=>({...x})), redeemed:[] },
        activeSem:"s1", tab:"today" };
  try{ localStorage.removeItem(KEY); }catch(e){}
  renderAll();
}
function exportData(){
  const json = JSON.stringify(S);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(json).then(()=>alert("备份已复制到剪贴板，可粘贴到备忘录保存。"))
      .catch(()=>prompt("复制下面的备份内容：", json));
  } else { prompt("复制下面的备份内容：", json); }
}
function importData(){
  const raw = prompt("粘贴之前的备份内容：");
  if(!raw) return;
  try {
    const d = JSON.parse(raw);
    S = Object.assign({tasks:{},papers:{},courses:{},leet:{count:0,notes:[]},logs:[],
      habits:{},weekly:{},life:{d:{},w:{},m:{}},anki:{cards:[]},
      pts:0,bonus:{},shop:{items:DEFAULT_SHOP.map(x=>({...x})),redeemed:[]},
      activeSem:"s1",tab:"today"}, d);
    if(!d.anki) S.anki={cards:[]};
    if(!d.life) S.life={d:{},w:{},m:{}};
    if(!d.shop) S.shop={items:DEFAULT_SHOP.map(x=>({...x})),redeemed:[]};
    if(typeof S.pts !== "number") S.pts = 0;
    if(!S.bonus) S.bonus = {};
    save(); renderAll(); alert("导入成功！");
  } catch(e){ alert("导入失败：内容格式不对。"); }
}

if ("serviceWorker" in navigator && location.protocol === "https:") {
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}

renderAll();
</script>
